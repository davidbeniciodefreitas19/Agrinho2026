<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agro Brasileiro</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background-color:#f4f4f4;
}

header{
    background-color:#2e8b57;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background-color:#1f5f3f;
    padding:10px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
}

section{
    padding:20px;
}

img{
    width:100%;
    max-width:700px;
    border-radius:10px;
    display:block;
    margin:auto;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin:20px auto;
    max-width:900px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
    background-color:#2e8b57;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}
